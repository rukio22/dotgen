<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Pixel Averager</title>

    <style>
        :root {
            --bg: #f4f6f8;
            --surface: #ffffff;
            --border: #d9e0e7;
            --text: #243246;
            --muted: #7a8797;
            --primary: #3d7edb;
            --primary-dark: #2e67b5;
            --primary-soft: #edf5ff;
            --shadow: 0 10px 28px rgba(37, 54, 75, 0.08);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--text);
            font-family:
                "Noto Sans JP", "Hiragino Kaku Gothic ProN",
                "Yu Gothic", Meiryo, sans-serif;
            background: var(--bg);
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        .app {
            width: min(1160px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0 48px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 22px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.7rem, 4vw, 2.4rem);
        }

        .workspace {
            display: grid;
            grid-template-columns: 340px minmax(0, 1fr);
            gap: 22px;
            align-items: start;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .settings {
            padding: 22px;
        }

        .section+.section {
            margin-top: 24px;
        }

        .label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .drop-zone {
            display: grid;
            place-items: center;
            min-height: 150px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            background: var(--primary-soft);
            border: 2px dashed #a9c7ed;
            border-radius: 12px;
            transition: 150ms ease;
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background: #e4f0ff;
        }

        .drop-zone input {
            display: none;
        }

        .drop-zone strong {
            color: var(--primary-dark);
            font-size: 0.92rem;
        }

        .range-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .range-value {
            min-width: 86px;
            padding: 7px 10px;
            color: var(--primary-dark);
            text-align: center;
            font-family: Consolas, monospace;
            font-size: 0.8rem;
            font-weight: 700;
            background: var(--primary-soft);
            border: 1px solid #c9ddf6;
            border-radius: 8px;
        }

        input[type="range"] {
            width: 100%;
            height: 22px;
            margin: 0;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            background: transparent;
            outline: none;
            touch-action: none;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 7px;
            background: linear-gradient(to right,
                    var(--primary) 0%,
                    var(--primary) var(--range-progress, 22.58%),
                    #d8e0e8 var(--range-progress, 22.58%),
                    #d8e0e8 100%);
            border-radius: 999px;
        }

        input[type="range"]::-moz-range-track {
            height: 7px;
            background: linear-gradient(to right,
                    var(--primary) 0%,
                    var(--primary) var(--range-progress, 22.58%),
                    #d8e0e8 var(--range-progress, 22.58%),
                    #d8e0e8 100%);
            border-radius: 999px;
        }

        input[type="range"]::-webkit-slider-thumb {
            width: 22px;
            height: 22px;
            margin-top: -7.5px;
            appearance: none;
            -webkit-appearance: none;
            cursor: grab;
            background: #ffffff;
            border: 5px solid var(--primary);
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(61, 126, 219, 0.25);
        }

        input[type="range"]:active::-webkit-slider-thumb {
            cursor: grabbing;
        }

        input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            cursor: grab;
            background: #ffffff;
            border: 5px solid var(--primary);
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(61, 126, 219, 0.25);
        }

        input[type="range"]:active::-moz-range-thumb {
            cursor: grabbing;
        }

        .primary-button {
            width: 100%;
            margin-top: 24px;
            padding: 14px 18px;
            color: #ffffff;
            font-weight: 700;
            cursor: pointer;
            background: var(--primary);
            border: 0;
            border-radius: 10px;
            transition: 150ms ease;
        }

        .primary-button:hover {
            background: var(--primary-dark);
        }

        .results {
            display: grid;
            gap: 22px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            margin: 0;
            font-size: 1rem;
        }

        .preview-area {
            min-height: 420px;
            display: grid;
            place-items: center;
            padding: 22px;
            background-color: #f8fafc;
            background-image:
                linear-gradient(45deg, #edf1f5 25%, transparent 25%),
                linear-gradient(-45deg, #edf1f5 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #edf1f5 75%),
                linear-gradient(-45deg, transparent 75%, #edf1f5 75%);
            background-position: 0 0, 0 10px, 10px -10px, -10px 0;
            background-size: 20px 20px;
        }

        .preview-canvas {
            width: min(82%, 560px);
            display: block;
            background: #ffffff;
            border: 1px solid #cbd5df;
            border-radius: 10px;
            image-rendering: pixelated;
        }

        .copy-button {
            padding: 8px 12px;
            color: var(--primary-dark);
            font-size: 0.76rem;
            font-weight: 700;
            cursor: pointer;
            background: var(--primary-soft);
            border: 1px solid #c9ddf6;
            border-radius: 8px;
        }

        .data-output {
            width: calc(100% - 40px);
            min-height: 190px;
            display: block;
            margin: 20px;
            padding: 16px;
            resize: vertical;
            color: #26384d;
            font-family: Consolas, monospace;
            font-size: 0.76rem;
            line-height: 1.7;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 10px;
            outline: none;
        }

        .data-output:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(61, 126, 219, 0.1);
        }

        .data-output::placeholder {
            color: #98a4b2;
        }

        @media (max-width: 860px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 560px) {
            .app {
                width: min(100% - 20px, 1160px);
                padding-top: 20px;
            }

            .settings {
                padding: 16px;
            }

            .preview-area {
                min-height: 310px;
                padding: 12px;
            }

            .preview-canvas {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <main class="app">
        <header class="page-header">
            <h1>Pixel Averager</h1>
        </header>

        <div class="workspace">
            <section class="card settings">
                <div class="section">
                    <label
                        class="label"
                        for="imageInput"
                    >画像</label>

                    <label
                        class="drop-zone"
                        for="imageInput"
                    >
                        <input
                            id="imageInput"
                            type="file"
                            accept="image/png, image/jpeg, image/webp"
                        >
                        <strong>画像を選択</strong>
                    </label>
                </div>

                <div class="section">
                    <div class="range-row">
                        <label
                            class="label"
                            for="pixelRange"
                        >平均範囲</label>

                        <output
                            class="range-value"
                            id="pixelRangeValue"
                            for="pixelRange"
                        >
                            8 × 8 px
                        </output>
                    </div>

                    <input
                        id="pixelRange"
                        type="range"
                        min="1"
                        max="32"
                        value="8"
                        step="1"
                    >
                </div>
            </section>

            <div class="results">
                <section class="card">
                    <div class="card-header">
                        <h2 class="card-title">プレビュー</h2>
                    </div>

                    <div class="preview-area">
                        <canvas
                            class="preview-canvas"
                            id="previewCanvas"
                            width="560"
                            height="420"
                            aria-label="変換後画像のプレビュー"
                        ></canvas>
                    </div>
                </section>

                <section class="card">
                    <div class="card-header">
                        <h2 class="card-title">ピクセルデータ</h2>

                        <button
                            class="copy-button"
                            id="copyButton"
                            type="button"
                        >
                            コピー
                        </button>
                    </div>

                    <textarea
                        class="data-output"
                        id="pixelDataOutput"
                        readonly
                        placeholder="[
  [[24, 18, 42], [51, 42, 96]],
  [[30, 25, 54], [72, 60, 128]]
]"
                    ></textarea>
                </section>
            </div>
        </div>
    </main>
    <script>
        const pixelRange = document.getElementById("pixelRange");
        const pixelRangeValue = document.getElementById("pixelRangeValue");

        function updateRange() {
            const min = Number(pixelRange.min);
            const max = Number(pixelRange.max);
            const value = Number(pixelRange.value);
            const progress = ((value - min) / (max - min)) * 100;

            pixelRange.style.setProperty("--range-progress", `${progress}%`);
            pixelRangeValue.textContent = `${value} × ${value} px`;
        }

        pixelRange.addEventListener("input", updateRange);
        pixelRange.addEventListener("change", updateRange);

        updateRange();
    </script>
    <script src="./index.js"></script>

</body>

</html>
