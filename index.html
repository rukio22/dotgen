<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Pixel Averager</title>

    <style>
        :root {
            --bg: #f4f6f8;
            --surface: #ffffff;
            --border: #d9e0e7;
            --text: #243246;
            --muted: #7a8797;
            --primary: #3d7edb;
            --primary-dark: #2e67b5;
            --primary-soft: #edf5ff;
            --shadow: 0 10px 28px rgba(37, 54, 75, 0.08);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--text);
            font-family:
                "Noto Sans JP", "Hiragino Kaku Gothic ProN",
                "Yu Gothic", Meiryo, sans-serif;
            background: var(--bg);
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        .app {
            width: min(1160px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0 48px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 22px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.7rem, 4vw, 2.4rem);
        }

        .workspace {
            display: grid;
            grid-template-columns: 340px minmax(0, 1fr);
            gap: 22px;
            align-items: start;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .settings {
            padding: 22px;
        }

        .section+.section {
            margin-top: 24px;
        }

        .label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .drop-zone {
            display: grid;
            place-items: center;
            min-height: 150px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            background: var(--primary-soft);
            border: 2px dashed #a9c7ed;
            border-radius: 12px;
            transition: 150ms ease;
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background: #e4f0ff;
        }

        .drop-zone input {
            display: none;
        }

        .drop-zone strong {
            color: var(--primary-dark);
            font-size: 0.92rem;
        }

        .range-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .range-value {
            min-width: 86px;
            padding: 7px 10px;
            color: var(--primary-dark);
            text-align: center;
            font-family: Consolas, monospace;
            font-size: 0.8rem;
            font-weight: 700;
            background: var(--primary-soft);
            border: 1px solid #c9ddf6;
            border-radius: 8px;
        }

        input[type="range"] {
            width: 100%;
            height: 22px;
            margin: 0;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            background: transparent;
            outline: none;
            touch-action: none;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 7px;
            background: linear-gradient(to right,
                    var(--primary) 0%,
                    var(--primary) var(--range-progress, 22.58%),
                    #d8e0e8 var(--range-progress, 22.58%),
                    #d8e0e8 100%);
            border-radius: 999px;
        }

        input[type="range"]::-moz-range-track {
            height: 7px;
            background: linear-gradient(to right,
                    var(--primary) 0%,
                    var(--primary) var(--range-progress, 22.58%),
                    #d8e0e8 var(--range-progress, 22.58%),
                    #d8e0e8 100%);
            border-radius: 999px;
        }

        input[type="range"]::-webkit-slider-thumb {
            width: 22px;
            height: 22px;
            margin-top: -7.5px;
            appearance: none;
            -webkit-appearance: none;
            cursor: grab;
            background: #ffffff;
            border: 5px solid var(--primary);
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(61, 126, 219, 0.25);
        }

        input[type="range"]:active::-webkit-slider-thumb {
            cursor: grabbing;
        }

        input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            cursor: grab;
            background: #ffffff;
            border: 5px solid var(--primary);
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(61, 126, 219, 0.25);
        }

        input[type="range"]:active::-moz-range-thumb {
            cursor: grabbing;
        }

        .primary-button {
            width: 100%;
            margin-top: 24px;
            padding: 14px 18px;
            color: #ffffff;
            font-weight: 700;
            cursor: pointer;
            background: var(--primary);
            border: 0;
            border-radius: 10px;
            transition: 150ms ease;
        }

        .primary-button:hover {
            background: var(--primary-dark);
        }

        .results {
            display: grid;
            gap: 22px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            margin: 0;
            font-size: 1rem;
        }

        .preview-area {
            min-height: 420px;
            display: grid;
            place-items: center;
            padding: 22px;
            background-color: #f8fafc;
            background-image:
                linear-gradient(45deg, #edf1f5 25%, transparent 25%),
                linear-gradient(-45deg, #edf1f5 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #edf1f5 75%),
                linear-gradient(-45deg, transparent 75%, #edf1f5 75%);
            background-position: 0 0, 0 10px, 10px -10px, -10px 0;
            background-size: 20px 20px;
        }

        .preview-canvas {
            width: min(82%, 560px);
            display: block;
            background: #ffffff;
            border: 1px solid #cbd5df;
            border-radius: 10px;
            image-rendering: pixelated;
        }

        .copy-controls {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .copy-row-controls {
            display: grid;
            grid-template-columns: repeat(2, minmax(180px, 1fr));
            gap: 14px;
        }

        .copy-range-control {
            display: grid;
            gap: 7px;
            min-width: 210px;
        }

        .stepper {
            display: grid;
            grid-template-columns: 30px minmax(70px, 1fr) 30px;
            align-items: center;
            gap: 6px;
        }

        .step-button {
            width: 30px;
            height: 30px;
            padding: 0;
            color: var(--primary-dark);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            background: #fff;
            border: 1px solid #c9ddf6;
            border-radius: 7px;
        }

        .step-button:hover {
            background: var(--primary-soft);
            border-color: var(--primary);
        }

        .step-button:disabled {
            color: #aab5c2;
            cursor: not-allowed;
            background: #f4f6f8;
            border-color: var(--border);
        }

        .copy-range-control label {
            color: var(--muted);
            font-size: 0.74rem;
            font-weight: 700;
        }

        .copy-range-control output {
            color: var(--primary-dark);
            font-family: Consolas, monospace;
            font-size: 0.74rem;
            font-weight: 700;
            text-align: right;
        }

        .copy-range-control input[type="range"] {
            grid-column: 1 / -1;
            width: 100%;
            height: 18px;
        }

        .copy-range-control input[type="range"]::-webkit-slider-runnable-track {
            height: 5px;
        }

        .copy-range-control input[type="range"]::-moz-range-track {
            height: 5px;
        }

        .copy-range-control input[type="range"]::-webkit-slider-thumb {
            width: 18px;
            height: 18px;
            margin-top: -6.5px;
            border-width: 4px;
        }

        .copy-range-control input[type="range"]::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border-width: 4px;
        }

        .copy-button {
            padding: 8px 12px;
            color: var(--primary-dark);
            font-size: 0.76rem;
            font-weight: 700;
            cursor: pointer;
            background: var(--primary-soft);
            border: 1px solid #c9ddf6;
            border-radius: 8px;
        }

        .data-output {
            width: calc(100% - 40px);
            min-height: 190px;
            display: block;
            margin: 20px;
            padding: 16px;
            resize: vertical;
            color: #26384d;
            font-family: Consolas, monospace;
            font-size: 0.76rem;
            line-height: 1.7;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 10px;
            outline: none;
        }

        .data-output:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(61, 126, 219, 0.1);
        }

        .data-output::placeholder {
            color: #98a4b2;
        }

        @media (max-width: 860px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 560px) {
            .app {
                width: min(100% - 20px, 1160px);
                padding-top: 20px;
            }

            .settings {
                padding: 16px;
            }

            .copy-controls {
                width: 100%;
                align-items: stretch;
                flex-direction: column;
            }

            .copy-row-controls {
                grid-template-columns: 1fr;
            }

            .copy-range-control {
                min-width: 0;
            }

            .preview-area {
                min-height: 310px;
                padding: 12px;
            }

            .preview-canvas {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <main class="app">
        <header class="page-header">
            <h1>Pixel Averager</h1>
        </header>

        <div class="workspace">
            <section class="card settings">
                <div class="section">
                    <label
                        class="label"
                        for="imageInput"
                    >画像</label>

                    <label
                        class="drop-zone"
                        for="imageInput"
                    >
                        <input
                            id="imageInput"
                            type="file"
                            accept="image/png, image/jpeg, image/webp"
                        >
                        <strong>画像を選択</strong>
                    </label>
                </div>

                <div class="section">
                    <div class="range-row">
                        <label
                            class="label"
                            for="pixelRange"
                        >平均範囲</label>

                        <output
                            class="range-value"
                            id="pixelRangeValue"
                            for="pixelRange"
                        >
                            8 × 8 px
                        </output>
                    </div>

                    <input
                        id="pixelRange"
                        type="range"
                        min="1"
                        max="32"
                        value="8"
                        step="1"
                    >
                </div>
            </section>

            <div class="results">
                <section class="card">
                    <div class="card-header">
                        <h2 class="card-title">プレビュー</h2>
                    </div>

                    <div class="preview-area">
                        <canvas
                            class="preview-canvas"
                            id="previewCanvas"
                            width="560"
                            height="420"
                            aria-label="変換後画像のプレビュー"
                        ></canvas>
                    </div>
                </section>

                <section class="card">
                    <div class="card-header">
                        <h2 class="card-title">ピクセルデータ</h2>

                        <div class="copy-controls">
                            <div class="copy-row-controls">
                                <div class="copy-range-control">
                                    <label for="copyStartRow">開始行</label>
                                    <div class="stepper">
                                        <button
                                            class="step-button"
                                            id="copyStartRowMinus"
                                            type="button"
                                            aria-label="開始行を1減らす"
                                        >−</button>
                                        <output
                                            id="copyStartRowValue"
                                            for="copyStartRow"
                                        >0行目</output>
                                        <button
                                            class="step-button"
                                            id="copyStartRowPlus"
                                            type="button"
                                            aria-label="開始行を1増やす"
                                        >＋</button>
                                    </div>
                                    <input
                                        id="copyStartRow"
                                        type="range"
                                        min="0"
                                        max="200"
                                        value="0"
                                        step="1"
                                    >
                                </div>

                                <div class="copy-range-control">
                                    <label for="copyRowCount">コピーする行数</label>
                                    <div class="stepper">
                                        <button
                                            class="step-button"
                                            id="copyRowCountMinus"
                                            type="button"
                                            aria-label="コピーする行数を1減らす"
                                        >−</button>
                                        <output
                                            id="copyRowCountValue"
                                            for="copyRowCount"
                                        >8行</output>
                                        <button
                                            class="step-button"
                                            id="copyRowCountPlus"
                                            type="button"
                                            aria-label="コピーする行数を1増やす"
                                        >＋</button>
                                    </div>
                                    <input
                                        id="copyRowCount"
                                        type="range"
                                        min="1"
                                        max="64"
                                        value="8"
                                        step="1"
                                    >
                                </div>
                            </div>

                            <button
                                class="copy-button"
                                id="copyButton"
                                type="button"
                            >
                                コピー
                            </button>
                        </div>
                    </div>

                    <textarea
                        class="data-output"
                        id="pixelDataOutput"
                        readonly
                    ></textarea>
                </section>
            </div>
        </div>
    </main>
    <script>
        const pixelRange = document.getElementById("pixelRange");
        const pixelRangeValue = document.getElementById("pixelRangeValue");
        const copyStartRow = document.getElementById("copyStartRow");
        const copyStartRowValue = document.getElementById("copyStartRowValue");
        const copyRowCount = document.getElementById("copyRowCount");
        const copyRowCountValue = document.getElementById("copyRowCountValue");
        const copyStartRowMinus = document.getElementById("copyStartRowMinus");
        const copyStartRowPlus = document.getElementById("copyStartRowPlus");
        const copyRowCountMinus = document.getElementById("copyRowCountMinus");
        const copyRowCountPlus = document.getElementById("copyRowCountPlus");

        function updateRange() {
            const min = Number(pixelRange.min);
            const max = Number(pixelRange.max);
            const value = Number(pixelRange.value);
            const progress = ((value - min) / (max - min)) * 100;

            pixelRange.style.setProperty("--range-progress", `${progress}%`);
            pixelRangeValue.textContent = `${value} × ${value} px`;
        }

        function updateCopySlider(slider, output, suffix) {
            const min = Number(slider.min);
            const max = Number(slider.max);
            const value = Number(slider.value);
            const progress = ((value - min) / (max - min)) * 100;

            slider.style.setProperty("--range-progress", `${progress}%`);
            output.textContent = `${value}${suffix}`;
        }

        function updateButtons(slider, minusButton, plusButton) {
            const value = Number(slider.value);
            minusButton.disabled = value <= Number(slider.min);
            plusButton.disabled = value >= Number(slider.max);
        }

        function changeSlider(slider, amount, updateFunction) {
            const nextValue = Math.min(
                Number(slider.max),
                Math.max(Number(slider.min), Number(slider.value) + amount)
            );
            slider.value = String(nextValue);
            updateFunction();
        }

        function updateCopyStartRow() {
            updateCopySlider(copyStartRow, copyStartRowValue, "行目");
            updateButtons(copyStartRow, copyStartRowMinus, copyStartRowPlus);
        }

        function updateCopyRowCount() {
            updateCopySlider(copyRowCount, copyRowCountValue, "行");
            updateButtons(copyRowCount, copyRowCountMinus, copyRowCountPlus);
        }

        pixelRange.addEventListener("input", updateRange);
        pixelRange.addEventListener("change", updateRange);
        copyStartRow.addEventListener("input", updateCopyStartRow);
        copyStartRow.addEventListener("change", updateCopyStartRow);
        copyRowCount.addEventListener("input", updateCopyRowCount);
        copyRowCount.addEventListener("change", updateCopyRowCount);

        copyStartRowMinus.addEventListener("click", () => changeSlider(copyStartRow, -1, updateCopyStartRow));
        copyStartRowPlus.addEventListener("click", () => changeSlider(copyStartRow, 1, updateCopyStartRow));
        copyRowCountMinus.addEventListener("click", () => changeSlider(copyRowCount, -1, updateCopyRowCount));
        copyRowCountPlus.addEventListener("click", () => changeSlider(copyRowCount, 1, updateCopyRowCount));

        updateRange();
        updateCopyStartRow();
        updateCopyRowCount();
    </script>
    <script src="index.js"></script>
</body>

</html>
